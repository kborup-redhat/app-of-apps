{{- if .Values.operators.keycloakOperator.enabled }}
{{- $kc := .Values.operators.keycloakOperator.config }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secret-generator
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: secret-generator
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
rules:
  - apiGroups: [""]
    resources: ["secrets", "namespaces"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: secret-generator
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
subjects:
  - kind: ServiceAccount
    name: secret-generator
    namespace: openshift-gitops
roleRef:
  kind: ClusterRole
  name: secret-generator
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: secret-generator
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: secret-generator
      restartPolicy: Never
      containers:
        - name: generate
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              generate_password() {
                cat /dev/urandom | tr -dc 'a-zA-Z0-9' | fold -w 32 | head -n 1
              }

              # Ensure rhbk namespace exists
              oc get namespace rhbk > /dev/null 2>&1 || oc create namespace rhbk
              # Ensure openshift-config namespace exists
              oc get namespace openshift-config > /dev/null 2>&1 || true

              # Generate keycloak-db-secret if it doesn't exist
              if oc get secret keycloak-db-secret -n rhbk > /dev/null 2>&1; then
                echo "keycloak-db-secret already exists, skipping."
              else
                DB_PASS=$(generate_password)
                echo "Generating keycloak-db-secret..."
                oc create secret generic keycloak-db-secret \
                  -n rhbk \
                  --from-literal=username=keycloak \
                  --from-literal=password="$DB_PASS"
                echo "keycloak-db-secret created."
              fi

              {{- if $kc.oauth }}
              {{- if $kc.oauth.enabled }}
              # Generate keycloak-client-secret if it doesn't exist
              if oc get secret keycloak-client-secret -n openshift-config > /dev/null 2>&1; then
                echo "keycloak-client-secret already exists, skipping."
              else
                CLIENT_SECRET=$(generate_password)
                echo "Generating keycloak-client-secret..."
                oc create secret generic keycloak-client-secret \
                  -n openshift-config \
                  --from-literal=clientSecret="$CLIENT_SECRET"
                echo "keycloak-client-secret created."

                # Also store the same client secret for the realm import to use
                if oc get secret keycloak-oauth-client-secret -n rhbk > /dev/null 2>&1; then
                  echo "keycloak-oauth-client-secret already exists, skipping."
                else
                  oc create secret generic keycloak-oauth-client-secret \
                    -n rhbk \
                    --from-literal=clientSecret="$CLIENT_SECRET"
                  echo "keycloak-oauth-client-secret stored in rhbk namespace."
                fi
              fi
              {{- end }}
              {{- end }}

              echo "Secret generation complete."
{{- end }}
