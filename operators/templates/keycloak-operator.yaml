{{- if .Values.operators.keycloakOperator.enabled }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: rhbk
  labels:
    openshift.io/cluster-monitoring: "true"
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: rhbk-operator
  namespace: rhbk
spec:
  targetNamespaces:
    - rhbk
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: rhbk-operator
  namespace: rhbk
spec:
  channel: {{ .Values.operators.keycloakOperator.channel }}
  installPlanApproval: Automatic
  name: rhbk-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
{{- end }}
